<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BitWet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══ HEADER ═══ -->
  <div class="header">
    <div class="logo">BitWet</div>
    <div class="header-meta">
      <span><span class="status-dot" id="statusDot"></span><span id="statusText">loading</span></span>
      <button class="refresh-btn" onclick="refreshAll()">
        refresh <span class="refresh-icon"></span>
      </button>
    </div>
  </div>

  <!-- ═══ NAV ═══ -->
  <nav class="nav">
    <button class="nav-btn active" onclick="switchTab('crags',this)"><span class="nav-icon" data-icon="usuals"></span> Usuals</button>
    <button class="nav-btn" onclick="switchTab('explore',this)"><span class="nav-icon" data-icon="explore"></span> Explore</button>
    <button class="nav-btn" onclick="openModal()"><span class="nav-icon" data-icon="addOne"></span> Add One</button>
  </nav>

  <!-- ═══ MAIN ═══ -->
  <main>
    <!-- Usuals tab -->
    <div class="tab-pane active" id="pane-crags">
      <div class="sort-bar">
        <button class="sort-btn active" data-sort="score" onclick="setSort(this)">Best Today</button>
        <button class="sort-btn" data-sort="name" onclick="setSort(this)">Name</button>
        <button class="sort-btn" data-sort="region" onclick="setSort(this)">Region</button>
      </div>
      <div id="cragGrid"></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-pip" style="background:var(--green)"></div>80+</div>
        <div class="legend-item"><div class="legend-pip" style="background:var(--green-light)"></div>60–79</div>
        <div class="legend-item"><div class="legend-pip" style="background:var(--yellow)"></div>40–59</div>
        <div class="legend-item"><div class="legend-pip" style="background:var(--coral)"></div>20–39</div>
        <div class="legend-item"><div class="legend-pip" style="background:var(--grey-score)"></div>0–19</div>
      </div>
    </div>

    <!-- Explore tab -->
    <div class="tab-pane" id="pane-explore">
      <div class="explore-controls">
        <select class="explore-sel" id="exploreDaySelect" onchange="renderExplore()">
          <option value="best">best day (7-day)</option>
        </select>
      </div>
      <div id="exploreGrid"></div>
    </div>
  </main>

  <!-- ═══ MODAL ═══ -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <h2 id="modalTitle">Add a crag</h2>

      <div class="field"><label>Name</label><input type="text" id="inputName" placeholder="e.g. Sobrio"></div>
      <div class="field"><label>Region</label><input type="text" id="inputRegion" placeholder="e.g. Ticino"></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="field"><label>Latitude</label><input type="number" step="any" id="inputLat" placeholder="46.480"></div>
        <div class="field"><label>Longitude</label><input type="number" step="any" id="inputLon" placeholder="8.920"></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="field"><label>Altitude (m)</label><input type="number" id="inputAlt" placeholder="950"></div>
        <div class="field"><label>Rock type</label><input type="text" id="inputRock" placeholder="Gneiss"></div>
      </div>

      <div class="field">
        <label>Wall orientation</label>
        <div class="orient-grid" id="orientationBtns"></div>
        <p class="field-hint">Which directions catch sun</p>
      </div>

      <div class="field"><label>Notes</label><textarea id="inputNotes" placeholder="Approach info, parking, best sectors…"></textarea></div>

      <div class="modal-btns">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveCrag()">Save</button>
      </div>
    </div>
  </div>

  <!-- ═══ SCRIPTS (order matters) ═══ -->
  <script src="data.js"></script>
  <script src="icons.js"></script>
  <script src="app.js"></script>

</body>
</html>
