<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crag Meteo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap');

:root {
–bg: #2c2a26;
–bg-warm: #33302b;
–card: #f0ece4;
–card-hover: #e8e3d9;
–card-border: #d9d3c7;
–card-shadow: rgba(28, 26, 22, 0.35);
–ink: #2c2a26;
–ink-soft: #5c5750;
–ink-faint: #9b9488;
–ink-ghost: #c4bdb2;
–ink-on-dark: #d4cfc6;
–ink-on-dark-soft: #9b9488;
–ink-on-dark-faint: #6b655c;
–moss: #6b8f5e;
–moss-soft: #6b8f5e33;
–stone-blue: #6b8293;
–clay: #b8764e;
–clay-soft: #b8764e28;
–dried-rose: #a67272;
–dried-rose-soft: #a6727228;
–lichen: #8a9a6b;
–score-great: #6b8f5e;
–score-good: #8a9a6b;
–score-ok: #b89f5e;
–score-poor: #b8764e;
–score-bad: #a67272;
–radius: 8px;
–radius-sm: 4px;
–transition: 0.2s ease;
}

- { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; }

body {
background: var(–bg);
color: var(–ink-on-dark);
font-family: ‘Source Sans 3’, ‘Segoe UI’, system-ui, sans-serif;
font-weight: 400;
line-height: 1.5;
min-height: 100vh;
}

header {
padding: 28px 24px 20px;
max-width: 800px;
margin: 0 auto;
}

.brand { display: flex; align-items: baseline; gap: 12px; }
.brand h1 { font-size: 1.5rem; font-weight: 300; letter-spacing: 0.04em; color: var(–ink-on-dark); }
.brand-dot { width: 6px; height: 6px; border-radius: 50%; background: var(–moss); flex-shrink: 0; position: relative; top: -1px; }

.header-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }

.status {
font-family: ‘DM Mono’, monospace;
font-size: 0.7rem; font-weight: 300;
color: var(–ink-on-dark-faint);
letter-spacing: 0.05em;
display: flex; align-items: center; gap: 8px;
}

.status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(–moss); transition: background var(–transition); }
.status-dot.loading { background: var(–clay); animation: breathe 1.5s ease-in-out infinite; }
.status-dot.error { background: var(–dried-rose); }

@keyframes breathe { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

.header-actions { display: flex; gap: 8px; }

.btn-ghost {
background: none; border: none;
color: var(–ink-on-dark-faint);
font-family: ‘Source Sans 3’, sans-serif;
font-size: 0.8rem; font-weight: 400;
cursor: pointer; padding: 6px 12px;
border-radius: var(–radius-sm);
transition: all var(–transition);
}
.btn-ghost:hover { color: var(–ink-on-dark); background: rgba(255,255,255,0.06); }

.sep { max-width: 800px; margin: 0 auto; padding: 0 24px; }
.sep::after { content: ‘’; display: block; height: 1px; background: linear-gradient(90deg, transparent, var(–ink-on-dark-faint), transparent); opacity: 0.2; }

main { max-width: 800px; margin: 0 auto; padding: 20px 24px 60px; }

.sort-bar { display: flex; align-items: center; gap: 4px; margin-bottom: 24px; }
.sort-label { font-size: 0.7rem; color: var(–ink-on-dark-faint); margin-right: 8px; font-weight: 300; letter-spacing: 0.05em; }

.sort-btn {
background: none; border: none;
color: var(–ink-on-dark-faint);
font-family: ‘Source Sans 3’, sans-serif;
font-size: 0.75rem; font-weight: 400;
cursor: pointer; padding: 4px 10px;
border-radius: 20px; transition: all var(–transition);
}
.sort-btn:hover { color: var(–ink-on-dark-soft); }
.sort-btn.active { background: rgba(255,255,255,0.08); color: var(–ink-on-dark); }

/* ─── CARD ─── */
.crag-card {
background: var(–card);
border-radius: var(–radius);
margin-bottom: 20px;
box-shadow: 0 2px 16px var(–card-shadow), 0 1px 3px var(–card-shadow);
overflow: hidden;
animation: rise 0.5s ease-out both;
transition: box-shadow 0.3s;
}
.crag-card:hover { box-shadow: 0 4px 24px var(–card-shadow), 0 1px 3px var(–card-shadow); }
@keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

.card-top { padding: 20px 24px 16px; }
.card-top-row { display: flex; align-items: flex-start; justify-content: space-between; }
.crag-name { font-size: 1.25rem; font-weight: 600; color: var(–ink); line-height: 1.2; }

.card-actions { display: flex; gap: 2px; margin: -4px -8px 0 0; }
.card-action-btn {
background: none; border: none;
color: var(–ink-ghost); cursor: pointer;
font-size: 0.85rem; padding: 6px 8px;
border-radius: var(–radius-sm);
transition: all var(–transition);
}
.card-action-btn:hover { color: var(–ink-soft); background: rgba(0,0,0,0.04); }

.crag-detail-row { display: flex; align-items: center; gap: 16px; margin-top: 6px; flex-wrap: wrap; }
.crag-detail { font-size: 0.8rem; color: var(–ink-faint); }

.orientation-row { display: flex; gap: 4px; margin-top: 10px; }
.orient-chip {
font-family: ‘DM Mono’, monospace;
font-size: 0.6rem; padding: 2px 7px;
border-radius: 3px; background: var(–card-hover);
color: var(–ink-faint); letter-spacing: 0.04em;
}
.orient-chip.sun { background: var(–clay-soft); color: var(–clay); }

/* ─── FORECAST ─── */
.forecast-area { border-top: 1px solid var(–card-border); }

.forecast-scroll {
display: flex; overflow-x: auto;
scroll-snap-type: x proximity;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
}
.forecast-scroll::-webkit-scrollbar { display: none; }

.day-cell {
flex: 1 0 0; min-width: 96px;
padding: 16px 8px 14px;
text-align: center; cursor: pointer;
position: relative; scroll-snap-align: start;
transition: background var(–transition);
border-right: 1px solid var(–card-border);
}
.day-cell:last-child { border-right: none; }
.day-cell:hover { background: var(–card-hover); }
.day-cell.today .day-name { color: var(–moss); font-weight: 600; }
.day-cell.today::after {
content: ‘’; position: absolute; bottom: 0; left: 50%;
transform: translateX(-50%); width: 24px; height: 2px;
background: var(–moss); border-radius: 1px;
}
.day-cell.expanded-cell { background: var(–card-hover); }

.day-name { font-size: 0.7rem; font-weight: 500; color: var(–ink-soft); letter-spacing: 0.06em; text-transform: uppercase; }
.day-date { font-size: 1.15rem; font-weight: 300; color: var(–ink); margin: 1px 0 8px; line-height: 1; }
.day-icon { font-size: 1.4rem; line-height: 1; margin-bottom: 8px; }

.score-bar-wrap { width: 100%; height: 3px; background: var(–card-border); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
.score-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease-out, background 0.3s; }

.score-num { font-family: ‘DM Mono’, monospace; font-size: 0.85rem; font-weight: 500; line-height: 1; }
.score-word { font-size: 0.6rem; font-weight: 400; color: var(–ink-faint); letter-spacing: 0.06em; margin-top: 2px; }

/* ─── EXPAND ─── */
.day-expand {
border-top: 1px solid var(–card-border);
padding: 16px 24px;
background: var(–card-hover);
animation: slideDown 0.25s ease-out;
}
@keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

.expand-header { font-size: 0.75rem; color: var(–ink-faint); margin-bottom: 10px; font-weight: 400; }
.expand-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px 24px; }
.expand-item { display: flex; flex-direction: column; gap: 2px; }
.expand-label { font-size: 0.65rem; font-weight: 400; color: var(–ink-faint); letter-spacing: 0.06em; text-transform: uppercase; }
.expand-val { font-size: 0.95rem; font-weight: 500; color: var(–ink); }
.expand-val.warn { color: var(–clay); }
.expand-val.bad { color: var(–dried-rose); }
.expand-val.rain { color: var(–stone-blue); }

/* ─── LOADING ─── */
.forecast-loading { display: flex; }
.day-skel {
flex: 1 0 0; min-width: 96px; height: 140px;
border-right: 1px solid var(–card-border);
position: relative; overflow: hidden;
}
.day-skel:last-child { border-right: none; }
.day-skel::after {
content: ‘’; position: absolute; inset: 0;
background: linear-gradient(90deg, transparent, rgba(0,0,0,0.03), transparent);
animation: shimmer 2s ease-in-out infinite;
}
@keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

.forecast-error { padding: 24px; text-align: center; font-size: 0.8rem; color: var(–dried-rose); }
.empty-state { text-align: center; padding: 60px 20px; color: var(–ink-on-dark-faint); }
.empty-state p { font-size: 0.9rem; font-weight: 300; line-height: 1.7; }

.legend { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-top: 32px; padding: 0 4px; }
.legend-label { font-size: 0.65rem; color: var(–ink-on-dark-faint); letter-spacing: 0.05em; font-weight: 300; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.7rem; color: var(–ink-on-dark-faint); font-weight: 300; }
.legend-dot { width: 8px; height: 3px; border-radius: 2px; }

/* ─── MODAL ─── */
.modal-overlay {
display: none; position: fixed; inset: 0;
background: rgba(28, 26, 22, 0.75);
z-index: 500; align-items: flex-end; justify-content: center;
backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
}
.modal-overlay.open { display: flex; }

.modal {
background: var(–card);
border-radius: var(–radius) var(–radius) 0 0;
padding: 32px 28px 40px;
width: 100%; max-width: 520px; max-height: 90vh;
overflow-y: auto; position: relative;
animation: sheet-up 0.3s ease-out;
}
@keyframes sheet-up { from { transform: translateY(100%); } to { transform: translateY(0); } }

@media (min-width: 600px) {
.modal-overlay { align-items: center; }
.modal { border-radius: var(–radius); max-height: 85vh; }
@keyframes sheet-up { from { opacity: 0; transform: translateY(20px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
}

.modal-handle { width: 32px; height: 3px; background: var(–ink-ghost); border-radius: 2px; margin: 0 auto 20px; }
@media (min-width: 600px) { .modal-handle { display: none; } }

.modal h2 { font-size: 1.1rem; font-weight: 600; color: var(–ink); margin-bottom: 24px; }
.field { margin-bottom: 18px; }
.field label { display: block; font-size: 0.72rem; font-weight: 500; color: var(–ink-faint); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px; }
.field input {
width: 100%; background: #fff;
border: 1px solid var(–card-border); color: var(–ink);
font-family: ‘Source Sans 3’, sans-serif; font-size: 0.95rem;
padding: 10px 14px; border-radius: var(–radius-sm);
outline: none; transition: border-color var(–transition);
}
.field input:focus { border-color: var(–moss); }
.field input::placeholder { color: var(–ink-ghost); }
.field-hint { font-size: 0.7rem; color: var(–ink-faint); margin-top: 4px; font-weight: 300; }

.orient-grid { display: flex; gap: 5px; flex-wrap: wrap; }
.orient-btn {
font-family: ‘DM Mono’, monospace; font-size: 0.7rem;
padding: 5px 11px; border: 1px solid var(–card-border);
background: #fff; color: var(–ink-faint); cursor: pointer;
border-radius: 3px; transition: all var(–transition);
}
.orient-btn:hover { border-color: var(–ink-faint); }
.orient-btn.active { background: var(–moss-soft); border-color: var(–moss); color: var(–moss); }

.modal-btns { display: flex; gap: 10px; margin-top: 28px; }
.modal-btns button {
flex: 1; padding: 12px;
font-family: ‘Source Sans 3’, sans-serif;
font-size: 0.85rem; font-weight: 500;
cursor: pointer; border-radius: var(–radius-sm);
transition: all var(–transition);
}
.btn-primary { background: var(–ink); color: var(–card); border: none; }
.btn-primary:hover { background: var(–ink-soft); }
.btn-secondary { background: none; border: 1px solid var(–card-border); color: var(–ink-faint); }
.btn-secondary:hover { border-color: var(–ink-faint); color: var(–ink-soft); }

.sandbox-banner {
background: var(–clay-soft); border: 1px solid var(–clay);
border-radius: var(–radius-sm); padding: 12px 18px; margin-bottom: 20px;
font-size: 0.8rem; color: var(–clay); line-height: 1.5;
}

@media (max-width: 500px) {
header { padding: 20px 18px 16px; }
main { padding: 16px 18px 48px; }
.card-top { padding: 16px 18px 14px; }
.day-cell { min-width: 80px; padding: 14px 6px 12px; }
.day-expand { padding: 14px 18px; }
.expand-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>

</head>
<body>

<header>
<div class="brand">
<h1>crag meteo</h1>
<span class="brand-dot"></span>
</div>
<div class="header-meta">
<div class="status">
<div class="status-dot" id="statusDot"></div>
<span id="statusText"></span>
</div>
<div class="header-actions">
<button class="btn-ghost" onclick="refreshAll()">refresh</button>
<button class="btn-ghost" onclick="openModal()">+ add crag</button>
</div>
</div>
</header>

<div class="sep"></div>

<main>
<div class="sort-bar">
<span class="sort-label">sort</span>
<button class="sort-btn active" data-sort="name" onclick="setSort(this)">name</button>
<button class="sort-btn" data-sort="score" onclick="setSort(this)">best day</button>
<button class="sort-btn" data-sort="region" onclick="setSort(this)">region</button>
</div>
<div id="cragGrid"></div>
<div class="legend">
<span class="legend-label">score</span>
<div class="legend-item"><div class="legend-dot" style="background:var(--score-great)"></div>80+ send it</div>
<div class="legend-item"><div class="legend-dot" style="background:var(--score-good)"></div>60–79 good</div>
<div class="legend-item"><div class="legend-dot" style="background:var(--score-ok)"></div>40–59 maybe</div>
<div class="legend-item"><div class="legend-dot" style="background:var(--score-poor)"></div>20–39 meh</div>
<div class="legend-item"><div class="legend-dot" style="background:var(--score-bad)"></div>0–19 rest</div>
</div>
</main>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
<div class="modal" onclick="event.stopPropagation()">
<div class="modal-handle"></div>
<h2 id="modalTitle">Add a crag</h2>
<div class="field"><label>Name</label><input type="text" id="inputName" placeholder="e.g. Sobrio"></div>
<div class="field"><label>Region</label><input type="text" id="inputRegion" placeholder="e.g. Ticino"></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
<div class="field"><label>Latitude</label><input type="number" step="any" id="inputLat" placeholder="46.480"></div>
<div class="field"><label>Longitude</label><input type="number" step="any" id="inputLon" placeholder="8.920"></div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
<div class="field"><label>Altitude (m)</label><input type="number" id="inputAlt" placeholder="950"></div>
<div class="field"><label>Rock type</label><input type="text" id="inputRock" placeholder="Gneiss"></div>
</div>
<div class="field">
<label>Wall orientation</label>
<div class="orient-grid" id="orientationBtns"></div>
<p class="field-hint">Which directions catch sun</p>
</div>
<div class="modal-btns">
<button class="btn-secondary" onclick="closeModal()">Cancel</button>
<button class="btn-primary" onclick="saveCrag()">Save</button>
</div>
</div>
</div>

<script>
const STORAGE_KEY = 'cragMeteo_v3';
const ORIENTATIONS = ['N','NE','E','SE','S','SW','W','NW'];

const DEFAULT_CRAGS = [
{ id: 'sobrio', name: 'Sobrio', region: 'Ticino', lat: 46.480, lon: 8.920, alt: 950, orientation: ['S','SE','SW'], rock: 'Gneiss' },
{ id: 'sunneplaettli', name: 'Sunneplättli', region: 'Schwyz (Gersau)', lat: 46.994, lon: 8.524, alt: 650, orientation: ['S','SW'], rock: 'Limestone' }
];

let crags = [], forecastCache = {}, currentSort = 'name', editingId = null, expandedDay = {};

function loadCrags() {
try { const s = localStorage.getItem(STORAGE_KEY); crags = s ? JSON.parse(s) : [...DEFAULT_CRAGS]; if (!s) saveCragsToStorage(); }
catch(e) { crags = [...DEFAULT_CRAGS]; }
}
function saveCragsToStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify(crags)); }

async function fetchForecast(crag) {
const params = new URLSearchParams({
latitude: crag.lat, longitude: crag.lon,
daily: 'temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,wind_gusts_10m_max,weather_code,sunshine_duration,uv_index_max',
timezone: 'Europe/Zurich', forecast_days: 7,
});
try {
const r = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
if (!r.ok) throw new Error(`HTTP ${r.status}`);
return r.json();
} catch(e) {
const sb = (window.self !== window.top) || (window.location.protocol === 'blob:');
if (sb || e.message?.includes('Failed to fetch') || e.name === 'TypeError')
throw new Error('Preview mode — open in browser for live data');
throw e;
}
}

function computeScore(d) {
let s = 100;
const p = d.precipitation_sum||0, pp = d.precipitation_probability_max||0;
if (p > 5) s -= 60; else if (p > 2) s -= 40; else if (p > 0.5) s -= 20; else if (p > 0) s -= 8;
s -= (pp/100)*15;
const w = d.wind_speed_10m_max||0, g = d.wind_gusts_10m_max||0;
if (g > 60) s -= 35; else if (g > 40) s -= 20; else if (w > 30) s -= 15; else if (w > 20) s -= 5;
const t = d.temperature_2m_max;
if (t !== undefined) { if (t < 2) s -= 30; else if (t < 6) s -= 18; else if (t < 10) s -= 8; else if (t > 35) s -= 25; else if (t > 30) s -= 12; }
const wc = d.weather_code||0;
if (wc >= 95) s -= 30; else if (wc >= 71) s -= 25; else if (wc >= 61) s -= 20; else if (wc >= 51) s -= 10; else if (wc >= 45) s -= 8;
return Math.max(0, Math.min(100, Math.round(s)));
}

function scoreColor(s) { return s >= 80 ? 'var(--score-great)' : s >= 60 ? 'var(--score-good)' : s >= 40 ? 'var(--score-ok)' : s >= 20 ? 'var(--score-poor)' : 'var(--score-bad)'; }
function scoreWord(s) { return s >= 80 ? 'send it' : s >= 60 ? 'good' : s >= 40 ? 'maybe' : s >= 20 ? 'meh' : 'rest'; }

function weatherIcon(c) {
if (c == null) return '—';
if (c <= 1) return '☀️'; if (c <= 3) return '⛅'; if (c <= 48) return '🌫️';
if (c <= 57) return '🌦️'; if (c <= 67) return '🌧️'; if (c <= 77) return '🌨️';
if (c <= 82) return '🌧️'; if (c <= 86) return '🌨️'; if (c >= 95) return '⛈️'; return '🌥️';
}

function extractDay(fc, i) {
return { temperature_2m_max: fc.daily.temperature_2m_max[i], temperature_2m_min: fc.daily.temperature_2m_min[i],
precipitation_sum: fc.daily.precipitation_sum[i], precipitation_probability_max: fc.daily.precipitation_probability_max[i],
wind_speed_10m_max: fc.daily.wind_speed_10m_max[i], wind_gusts_10m_max: fc.daily.wind_gusts_10m_max[i],
weather_code: fc.daily.weather_code[i], sunshine_duration: fc.daily.sunshine_duration?.[i], uv_index_max: fc.daily.uv_index_max?.[i] };
}

function renderCards() {
const grid = document.getElementById('cragGrid');
let sorted = [...crags];
if (currentSort === 'score') sorted.sort((a,b) => getBestScore(b.id) - getBestScore(a.id));
else if (currentSort === 'region') sorted.sort((a,b) => (a.region||'').localeCompare(b.region||''));
else sorted.sort((a,b) => a.name.localeCompare(b.name));

if (!sorted.length) { grid.innerHTML = '<div class="empty-state"><p>No crags yet.<br>Tap "+ add crag" to begin.</p></div>'; return; }

const sunFaces = ['S','SE','SW','E','W'];
const today = new Date().toISOString().slice(0,10);

grid.innerHTML = sorted.map((c, ci) => {
const fc = forecastCache[c.id];
const orientHTML = (c.orientation||[]).map(o => `<span class="orient-chip ${sunFaces.includes(o)?'sun':''}">${o}</span>`).join('');

let fHTML;
if (!fc) {
fHTML = `<div class="forecast-area"><div class="forecast-loading">${'<div class="day-skel"></div>'.repeat(7)}</div></div>`;
} else if (fc.error) {
fHTML = `<div class="forecast-area"><div class="forecast-error">${fc.error}</div></div>`;
} else {
const expIdx = expandedDay[c.id];
const cells = fc.daily.time.map((t, di) => {
const dt = new Date(t+'T00:00:00');
const dd = extractDay(fc, di);
const sc = computeScore(dd);
const col = scoreColor(sc);
const isExp = expIdx === di;
return `<div class="day-cell ${t===today?'today':''} ${isExp?'expanded-cell':''}" onclick="toggleExpand('${c.id}',${di})">
<div class="day-name">${dt.toLocaleDateString('en-US',{weekday:'short'})}</div>
<div class="day-date">${dt.getDate()}</div>
<div class="day-icon">${weatherIcon(dd.weather_code)}</div>
<div class="score-bar-wrap"><div class="score-bar-fill" style="width:${sc}%;background:${col}"></div></div>
<div class="score-num" style="color:${col}">${sc}</div>
<div class="score-word">${scoreWord(sc)}</div>
</div>`;
}).join('');

let expHTML = '';
if (expIdx != null) {
const dd = extractDay(fc, expIdx);
const p = dd.precipitation_sum||0, pp = dd.precipitation_probability_max||0;
const w = dd.wind_speed_10m_max||0, g = dd.wind_gusts_10m_max||0;
const sh = dd.sunshine_duration ? (dd.sunshine_duration/3600).toFixed(1) : '—';
const uv = dd.uv_index_max != null ? dd.uv_index_max.toFixed(0) : '—';
let wc = g > 50 ? 'bad' : (g > 35 || w > 25) ? 'warn' : '';
let rc = p > 0.5 ? 'rain' : '';
const dl = new Date(fc.daily.time[expIdx]+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});

expHTML = `<div class="day-expand">
<div class="expand-header">${dl}</div>
<div class="expand-grid">
<div class="expand-item"><span class="expand-label">Temperature</span><span class="expand-val">${dd.temperature_2m_min!=null?Math.round(dd.temperature_2m_min):'?'}° / ${dd.temperature_2m_max!=null?Math.round(dd.temperature_2m_max):'?'}°</span></div>
<div class="expand-item"><span class="expand-label">Rain</span><span class="expand-val ${rc}">${p.toFixed(1)} mm · ${pp}%</span></div>
<div class="expand-item"><span class="expand-label">Wind</span><span class="expand-val ${wc}">${Math.round(w)} km/h</span></div>
<div class="expand-item"><span class="expand-label">Gusts</span><span class="expand-val ${wc}">${Math.round(g)} km/h</span></div>
<div class="expand-item"><span class="expand-label">Sunshine</span><span class="expand-val">${sh} h</span></div>
<div class="expand-item"><span class="expand-label">UV index</span><span class="expand-val">${uv}</span></div>
</div>
</div>`;
}
fHTML = `<div class="forecast-area"><div class="forecast-scroll">${cells}</div>${expHTML}</div>`;
}

return `<div class="crag-card" style="animation-delay:${ci*0.1}s">
<div class="card-top">
<div class="card-top-row">
<div class="crag-name">${c.name}</div>
<div class="card-actions">
<button class="card-action-btn" onclick="editCrag('${c.id}')">✎</button>
<button class="card-action-btn" onclick="removeCrag('${c.id}')">✕</button>
</div>
</div>
<div class="crag-detail-row">
<span class="crag-detail">${c.region||''}</span>
<span class="crag-detail">${c.alt||'—'}m</span>
<span class="crag-detail">${c.rock||''}</span>
</div>
${orientHTML ? `<div class="orientation-row">${orientHTML}</div>` : ''}
</div>
${fHTML}
</div>`;
}).join('');
}

function toggleExpand(id, di) { expandedDay[id] = expandedDay[id] === di ? null : di; renderCards(); }

function getBestScore(id) {
const fc = forecastCache[id]; if (!fc?.daily) return -1;
return Math.max(...fc.daily.time.map((_,i) => computeScore(extractDay(fc,i))));
}

async function fetchAllForecasts() {
setStatus('loading','updating…');
let err = false;
await Promise.all(crags.map(async c => {
try { forecastCache[c.id] = await fetchForecast(c); }
catch(e) { forecastCache[c.id] = { error: e.message }; err = true; }
renderCards();
}));
if (err) setStatus('error','connection issue');
else { const t = new Date(); setStatus('ok', `updated ${t.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false})}`); }
}

function refreshAll() { forecastCache = {}; expandedDay = {}; renderCards(); fetchAllForecasts(); }
function setStatus(s, t) { const d = document.getElementById('statusDot'), x = document.getElementById('statusText'); d.className = 'status-dot'; if (s==='loading') d.classList.add('loading'); if (s==='error') d.classList.add('error'); x.textContent = t; }
function setSort(b) { document.querySelectorAll('.sort-btn').forEach(p => p.classList.remove('active')); b.classList.add('active'); currentSort = b.dataset.sort; renderCards(); }

let selectedOrientations = [];
function buildOrientationButtons() {
document.getElementById('orientationBtns').innerHTML = ORIENTATIONS.map(o =>
`<button type="button" class="orient-btn ${selectedOrientations.includes(o)?'active':''}" onclick="toggleOrientation('${o}',this)">${o}</button>`
).join('');
}
function toggleOrientation(o, b) { const i = selectedOrientations.indexOf(o); if (i>=0) { selectedOrientations.splice(i,1); b.classList.remove('active'); } else { selectedOrientations.push(o); b.classList.add('active'); } }

function openModal(id) {
editingId = id||null; selectedOrientations = [];
if (editingId) {
const c = crags.find(x=>x.id===editingId); if (!c) return;
document.getElementById('modalTitle').textContent = 'Edit crag';
document.getElementById('inputName').value = c.name;
document.getElementById('inputRegion').value = c.region||'';
document.getElementById('inputLat').value = c.lat;
document.getElementById('inputLon').value = c.lon;
document.getElementById('inputAlt').value = c.alt||'';
document.getElementById('inputRock').value = c.rock||'';
selectedOrientations = [...(c.orientation||[])];
} else {
document.getElementById('modalTitle').textContent = 'Add a crag';
['inputName','inputRegion','inputLat','inputLon','inputAlt','inputRock'].forEach(id => document.getElementById(id).value = '');
}
buildOrientationButtons();
document.getElementById('modalOverlay').classList.add('open');
setTimeout(() => document.getElementById('inputName').focus(), 100);
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingId = null; }
function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

async function saveCrag() {
const name = document.getElementById('inputName').value.trim();
const region = document.getElementById('inputRegion').value.trim();
const lat = parseFloat(document.getElementById('inputLat').value);
const lon = parseFloat(document.getElementById('inputLon').value);
const alt = parseInt(document.getElementById('inputAlt').value)||null;
const rock = document.getElementById('inputRock').value.trim();
if (!name || isNaN(lat) || isNaN(lon)) { alert('Name, latitude, and longitude are required.'); return; }
if (editingId) { const i = crags.findIndex(c=>c.id===editingId); if (i>=0) { crags[i] = {...crags[i], name, region, lat, lon, alt, rock, orientation:[...selectedOrientations]}; delete forecastCache[editingId]; } }
else { crags.push({ id: name.toLowerCase().replace(/[^a-z0-9]/g,'-')+'-'+Date.now(), name, region, lat, lon, alt, rock, orientation:[...selectedOrientations] }); }
saveCragsToStorage(); closeModal(); renderCards(); fetchAllForecasts();
}
function editCrag(id) { openModal(id); }
function removeCrag(id) { const c = crags.find(x=>x.id===id); if (!c||!confirm(`Remove ${c.name}?`)) return; crags = crags.filter(x=>x.id!==id); delete forecastCache[id]; saveCragsToStorage(); renderCards(); }

function init() {
loadCrags(); renderCards();
const sb = (window.self !== window.top) || (window.location.protocol === 'blob:');
if (sb) {
const b = document.createElement('div'); b.className = 'sandbox-banner';
b.textContent = 'Preview mode — download and open in your browser for live weather data.';
document.querySelector('main').prepend(b);
setStatus('error','preview only'); return;
}
fetchAllForecasts(); setInterval(()=>fetchAllForecasts(), 30*60*1000);
}

document.addEventListener('DOMContentLoaded', init);
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });
</script>

</body>
</html>
